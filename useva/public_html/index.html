<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U Seva - National Home Service Project</title>
    <link rel="stylesheet" href="css_js/style.css">
    <style>
        :root { --navy: #001f3f; --orange: #ff851b; }
        body { 
            background: #020202; 
            color: white; 
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Premium Background Effect */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #001f3f 0%, #000 70%);
            text-align: center;
        }

        .main-logo { width: 150px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--orange)); }

        .glass-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 500px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h1 { font-size: 32px; margin-bottom: 10px; text-transform: uppercase; }
        h1 span { color: var(--orange); }
        p { opacity: 0.7; margin-bottom: 30px; }

        label { display: block; text-align: left; margin-bottom: 10px; color: var(--orange); font-weight: bold; }

        select {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: #fff;
            color: #333;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        .go-btn {
            margin-top: 25px;
            width: 100%;
            padding: 15px;
            background: var(--orange);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 133, 27, 0.3);
        }

        .go-btn:hover { background: #fff; color: var(--navy); transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="hero-section">
        <img src="assets/images/useva_logo.png" alt="U Seva Logo" class="main-logo">
        
        <div class="glass-container">
            <h1>U-SEVA <span>NATIONAL</span></h1>
            <p>भारत की सबसे भरोसेमंद होम सर्विस डिलीवरी</p>

            <label>अपना राज्य चुनें (Select State):</label>
            <select id="stateSelector">
                <option value="">-- चुनें --</option>
                <option value="bihar">Bihar (Bihar)</option>
                <option value="up">Uttar Pradesh</option>
                <option value="delhi">Delhi</option>
                <option value="jharkhand">Jharkhand</option>
            </select>

            <button class="go-btn" onclick="goToServices()">आगे बढ़ें (Proceed)</button>
        </div>
        
        <p style="margin-top:40px; font-size:12px; opacity:0.4;">© 2026 U-SEVA | Developed by Saurav Kumar</p>
    </div>

    <script>
        function goToServices() {
            const state = document.getElementById('stateSelector').value;
            if(state === "") {
                alert("कृपया अपना राज्य चुनें!");
            } else {
                // डायग्राम के हिसाब से सर्विसेज पेज पर भेजें
                window.location.href = "services.html";
            }
        }
    </script>

</body>
</html>
